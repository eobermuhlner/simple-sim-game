world:
  seed: 42
  tick_interval: 1.0
  nearby_settlement_radius: 5

simulation:
  scan_radius: 3
  food_demand_per_pop: 0.15
  growth_rate: 0.01
  starvation_rate: 0.02
  price_lerp_alpha: 0.2
  smoothing_alpha: 0.15
  caravan_base_speed: 0.5
  cargo_threshold: 0.2
  cargo_batch: 0.3
  caravan_upkeep_per_tile: 0.005
  price_min: 0.5
  price_max: 2.0
  goods_demand_multiplier: 0.01
  arbitrage_threshold: 0.8
  level_growth_multipliers:
    VILLAGE: 1.0
    TOWN: 0.8
    CITY: 0.6
    METROPOLIS: 0.4
  terrain_production:
    FOREST_WOOD: 2.0
    STONE_STONE: 1.0
    GRASS_FOOD: 0.5

settlement:
  starting_population: 10
  starting_gold: 50.0
  storage_capacity: 500.0
  max_buildings:
    VILLAGE: 5
    TOWN: 15
    CITY: 30
    METROPOLIS: 50

trade:
  max_caravans_per_route: 3
  base_spawn_interval: 120.0

pathfinding:
  max_manhattan: 300
  bridge_zone_radius: 2
  bridge_zone_cost: 2.0

terrain:
  noise_scale: 0.04
  noise_octaves: 4
  persistence: 0.5
  tileset: 64x64/map.png
  thresholds:
    water: 0.45
    grass: 0.55
    forest: 0.60
    stone: 0.65
  types:
    WATER:  { tile_index: 1 }
    GRASS:  { tile_index: 2 }
    FOREST: { tile_index: 3 }
    STONE:  { tile_index: 4 }
    SNOW:   { tile_index: 5 }

terrain_objects:
  TREE_LARGE:
    id: 1
    image: 64x64/objects/tree-large.png
    walkable: false
    spawn:
      GRASS: 0.10
      FOREST: 0.40
  TREE_SMALL:
    id: 2
    image: 64x64/objects/tree-small.png
    walkable: false
    spawn:
      GRASS: 0.20
      FOREST: 0.30
  BOULDER_LARGE:
    id: 3
    image: 64x64/objects/boulder-large.png
    walkable: false
    spawn:
      GRASS: 0.10
      FOREST: 0.20
      STONE: 0.30
  BOULDER_SMALL:
    id: 4
    image: 64x64/objects/boulder-small.png
    walkable: true
    spawn:
      GRASS: 0.10
      STONE: 0.40
  BOULDER_SNOW:
    id: 5
    image: 64x64/objects/boulder-large-snow.png
    walkable: true
    spawn:
      SNOW: 0.20

roads:
  DIRT:
    cost: 5
    speed_multiplier: 1.0
    capacity: 2
    upkeep_per_tick: 0.0
  STONE:
    cost: 20
    speed_multiplier: 1.5
    capacity: 4
    upkeep_per_tick: 0.01
  COBBLESTONE:
    cost: 50
    speed_multiplier: 2.0
    capacity: 6
    upkeep_per_tick: 0.02
  ROMAN:
    cost: 100
    speed_multiplier: 3.0
    capacity: 10
    upkeep_per_tick: 0.05

specializations:
  NONE:            { wood: 1.0, stone: 1.0, food: 1.0, goods: 1.0 }
  LOGGING_CAMP:    { wood: 2.0, stone: 0.5, food: 0.5, goods: 1.0 }
  MINING_TOWN:     { wood: 0.5, stone: 2.0, food: 0.5, goods: 1.0 }
  FARMING_VILLAGE: { wood: 0.5, stone: 0.5, food: 2.0, goods: 1.0 }
  TRADE_HUB:       { wood: 1.0, stone: 1.0, food: 1.0, goods: 1.5 }

exploration_rewards:
  WOOD_CACHE:
    id: 10
    image: 64x64/objects/chest-group.png
    reward_type: ONE_TIME
    required_level: VILLAGE
    rewards:
      WOOD: 20.0
    spawn:
      GRASS: 0.010
      FOREST: 0.015
  STONE_CACHE:
