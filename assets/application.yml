    id: 15
    image: ""
    walkable: false
    reward_type: ONE_TIME
    required_level: CITY
    description: "Crumbling remnants of a lost civilization. Excavate for a massive haul of all resources."
    rewards:
      WOOD: 50.0
      STONE: 50.0
      FOOD: 50.0
      GOLD: 100.0
    spawn:
      GRASS: 0.003
      SNOW: 0.003

