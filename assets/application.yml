world:
  seed: 42
  tick_interval: 1.0
  nearby_settlement_radius: 5

simulation:
  scan_radius: 3
  food_demand_per_pop: 0.15
  growth_rate: 0.01
  starvation_rate: 0.02
  price_lerp_alpha: 0.2
  smoothing_alpha: 0.15
  caravan_base_speed: 0.5
  cargo_threshold: 0.2
  cargo_batch: 0.3
  caravan_upkeep_per_tile: 0.005
  price_min: 0.5
  price_max: 2.0
  goods_demand_multiplier: 0.01
  arbitrage_threshold: 0.8
  level_growth_multipliers:
    VILLAGE: 1.0
    TOWN: 0.8
    CITY: 0.6
    METROPOLIS: 0.4
  terrain_production:
    FOREST_WOOD: 2.0
    STONE_STONE: 1.0
    GRASS_FOOD: 0.5

settlement:
  starting_population: 10
  starting_gold: 50.0
  storage_capacity: 500.0
  max_buildings:
    VILLAGE: 5
    TOWN: 15
    CITY: 30
    METROPOLIS: 50

trade:
  max_caravans_per_route: 3
  base_spawn_interval: 120.0

pathfinding:
  max_manhattan: 300
  bridge_zone_radius: 2
  bridge_zone_cost: 2.0

destroy:
  building_fraction: 0.5

terrain:
  noise_scale: 0.04
  noise_octaves: 4
  persistence: 0.5
  tileset: 64x64/map.png
  thresholds:
    water: 0.45
    shallow_sea: 0.47
    grass: 0.55
    forest: 0.60
    stone: 0.65
  types:
    WATER:       { tile_index: 1 }
    SHALLOW_SEA: { tile_index: 1 }
    GRASS:       { tile_index: 2 }
    FOREST:      { tile_index: 3 }
    STONE:       { tile_index: 4 }
    SNOW:        { tile_index: 5 }

terrain_objects:
  TREE_LARGE:
    id: 1
    image: 64x64/objects/tree-large.png
    walkable: false
    destroy_cost: 2.0
    harvest:
      WOOD: 5.0
    spawn:
      GRASS: 0.10
      FOREST: 0.40
  TREE_SMALL:
    id: 2
    image: 64x64/objects/tree-small.png
    walkable: false
    destroy_cost: 1.0
