  FOOD_CACHE:
    id: 12
    image: 64x64/objects/granary.png
    walkable: false
    reward_type: ONE_TIME
    required_level: VILLAGE
    description: "Stored provisions left by earlier settlers. A one-time food windfall."
    rewards:
      FOOD: 30.0
    spawn:
      GRASS: 0.012
  FERTILE_LAND:
    id: 13
    image: ""
    walkable: true
    reward_type: BONUS
    required_level: TOWN
    description: "Exceptionally rich soil. Permanently boosts food production in this settlement."
    bonus_production:
      FOOD: 2.0
    spawn:
      GRASS: 0.008
  RICH_DEPOSITS:
    id: 14
    image: ""
    walkable: true
    reward_type: BONUS
    required_level: TOWN
    description: "Mineral veins beneath the surface. Permanently increases stone output."
