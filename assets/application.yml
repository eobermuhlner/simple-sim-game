world:
  seed: 42
  tick_interval: 1.0
  nearby_settlement_radius: 5

simulation:
  scan_radius: 3
  food_demand_per_pop: 0.07
  growth_rate: 0.005
  starvation_rate: 0.01
  price_lerp_alpha: 0.02
  smoothing_alpha: 0.15
  caravan_base_speed: 0.5
  cargo_threshold: 0.2
  cargo_batch: 0.3
  caravan_upkeep_per_tile: 0.005
  price_min: 0.8
  price_max: 1.2
  goods_demand_multiplier: 0.01
  arbitrage_threshold: 0.8
  level_growth_multipliers:
    VILLAGE: 1.0
    TOWN: 0.8
    CITY: 0.6
    METROPOLIS: 0.4
  terrain_production:
    FOREST_WOOD: 2.0
    STONE_STONE: 1.5
    GRASS_FOOD: 1.5

settlement:
  starting_population: 10
  starting_gold: 50.0
  storage_capacity: 500.0
  types:
    - id: VILLAGE
      display_name: Village
      min_population: 1
      max_population: 50
      max_buildings: 5
      radius: 3
    - id: TOWN
      display_name: Town
      min_population: 51
      max_population: 200
      max_buildings: 10
      radius: 4
    - id: CITY
      display_name: City
      min_population: 201
      max_population: 500
      max_buildings: 15
      radius: 5
    - id: METROPOLIS
      display_name: Metropolis
      min_population: 501
      max_population: 2147483647
      max_buildings: 20
      radius: 6

trade:
  max_caravans_per_route: 3
  base_spawn_interval: 120.0

pathfinding:
  max_manhattan: 300
  bridge_zone_radius: 2
  bridge_zone_cost: 2.0

destroy:
  building_fraction: 0.5

terrain:
  noise_scale: 0.04
  noise_octaves: 4
  persistence: 0.5
  tileset: 64x64/map.png
  thresholds:
    deep_sea: 0.35
    shallow_sea: 0.45
    grass: 0.55
    forest: 0.60
    stone: 0.65
  types:
    DEEP_SEA:
      tile_index: 0
      description: "Deep open ocean. Impassable and unbuildable."
    SHALLOW_SEA:
      tile_index: 1
      description: "Coastal waters. Harbors can be built here."
    GRASS:
      tile_index: 2
      description: "Fertile plains ideal for farming and settlement."
    FOREST:
      tile_index: 3
      description: "Dense woodland rich in timber resources."
    STONE:
      tile_index: 4
      description: "Rocky highland. Good source of stone for construction."
    SNOW:
      tile_index: 5
      description: "Frozen tundra. Harsh but traversable terrain."

terrain_objects:
  TREE_LARGE:
    id: 1
    image: 64x64/objects/tree-large.png
    walkable: false
    destroy_cost: 2.0
    description: "A towering ancient tree. Clear it to harvest a large amount of timber."
    harvest:
      WOOD: 5.0
    spawn:
      GRASS: 0.10
      FOREST: 0.40
  TREE_SMALL:
    id: 2
    image: 64x64/objects/tree-small.png
    walkable: false
    destroy_cost: 1.0
    description: "A young tree. Yields modest timber when cleared."
    harvest:
      WOOD: 2.0
    spawn:
      GRASS: 0.20
      FOREST: 0.30
  BOULDER_LARGE:
    id: 3
    image: 64x64/objects/boulder-large.png
    walkable: false
    destroy_cost: 2.0
    description: "A massive rock formation. Quarry it for a large haul of stone."
    harvest:
      STONE: 5.0
    spawn:
      GRASS: 0.10
      FOREST: 0.20
      STONE: 0.30
  BOULDER_SMALL:
    id: 4
    image: 64x64/objects/boulder-small.png
    walkable: true
    destroy_cost: 1.0
    description: "A loose boulder. Passable but yields some stone if removed."
    harvest:
      STONE: 2.0
    spawn:
      GRASS: 0.10
      STONE: 0.40
  BOULDER_SNOW:
    id: 5
    image: 64x64/objects/boulder-large-snow.png
    walkable: true
    destroy_cost: 1.0
    description: "A snow-covered boulder. Passable; no harvestable resources."
    spawn:
      SNOW: 0.20

roads:
  DIRT:
    cost: 5
    destroy_cost: 1.0
    speed_multiplier: 1.0
    capacity: 2
    upkeep_per_tick: 0.0
    description: "A simple dirt path. Cheap to build, basic trade capacity."
  STONE:
    cost: 20
    destroy_cost: 3.0
    speed_multiplier: 1.5
    capacity: 4
    upkeep_per_tick: 0.01
    description: "A paved stone road. Faster travel and higher trade throughput."
  COBBLESTONE:
    cost: 50
    destroy_cost: 5.0
    speed_multiplier: 2.0
    capacity: 6
    upkeep_per_tick: 0.02
    description: "Carefully laid cobblestones. Reliable all-weather road for busy routes."
  ROMAN:
    cost: 100
    destroy_cost: 10.0
    speed_multiplier: 3.0
    capacity: 10
    upkeep_per_tick: 0.05
    description: "An engineered Roman road. The pinnacle of road construction—fast and high-capacity."

specializations:
  NONE:            { wood: 1.0, stone: 1.0, food: 1.0, goods: 1.0 }
  LOGGING_CAMP:    { wood: 2.0, stone: 0.5, food: 0.5, goods: 1.0 }
  MINING_TOWN:     { wood: 0.5, stone: 2.0, food: 0.5, goods: 1.0 }
  FARMING_VILLAGE: { wood: 0.5, stone: 0.5, food: 2.0, goods: 1.0 }
  TRADE_HUB:       { wood: 0.8, stone: 0.8, food: 0.8, goods: 1.6 }

exploration_rewards:
